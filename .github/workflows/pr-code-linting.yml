---
name: Code Linting

on:
  pull_request:
    branches:
      - develop

permissions: read-all

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Remove previous Super-linter PR comments
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "Looking for previous Super-linter comments on PR #${PR_NUMBER}"

          comment_ids="$(
            gh api \
              "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --paginate \
              --jq '.[]
                | select(.user.type == "Bot")
                | select(.body | contains("Powered by [Super-linter]"))
                | .id'
          )"

          if [ -z "${comment_ids}" ]; then
            echo "No previous Super-linter comments found."
            exit 0
          fi

          echo "${comment_ids}" | while read -r comment_id; do
            [ -z "${comment_id}" ] && continue

            echo "Deleting Super-linter comment ${comment_id}"

            gh api \
              --method DELETE \
              "repos/${REPO}/issues/comments/${comment_id}"
          done

      - name: Super-linter
        uses: super-linter/super-linter/slim@9e863354e3ff62e0727d37183162c4a88873df41 # v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_CHECKOV: false
          VALIDATE_JSCPD: false
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false
          VALIDATE_TRIVY: false
          SUPPRESS_POSSUM: true
          LINTER_RULES_PATH: /
          DISABLE_ERRORS: true
          SAVE_SUPER_LINTER_SUMMARY: true
          FAIL_ON_INVALID_GITHUB_ACTIONS_EVENT_CONFIGURATION: true
          NO_COLOR: "1"
          FORCE_COLOR: "0"
          TERM: dumb