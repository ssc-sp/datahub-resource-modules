name: PR Conventional Commit Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions: {}

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Checking PR title for Conventional Commits format..."

          # Regex breakdown:
          # ^(feat|fix|docs|test|ci|refactor|perf|chore|revert) - Allowed types
          # (\([a-zA-Z0-9_ -]+\))?                              - Optional scope in parentheses
          # !?                                                  - Optional breaking change indicator (!)
          # :                                                   - Colon and a space
          # .+$                                                 - Description (at least one character)
          REGEX="^(feat|fix|docs|test|ci|refactor|perf|chore|revert)(\([a-zA-Z0-9_ -]+\))?!?: .+$"

          if [[ "$PR_TITLE" =~ $REGEX ]]; then
            echo "✅ PR title meets Conventional Commit standards."
            exit 0
          else
            echo "❌ ERROR: PR title does not match Conventional Commits format."
            echo ""
            echo "Your title: '$PR_TITLE'"
            echo ""
            echo "Expected format: <type>[optional scope]: <description>"
            echo "Allowed types: feat, fix, docs, test, ci, refactor, perf, chore, revert"
            echo ""
            echo "Examples:"
            echo "  feat: add new login page"
            echo "  fix(auth): resolve token expiration issue"
            echo "  feat!: breaking change to API"
            exit 1
          fi
